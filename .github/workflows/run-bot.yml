name: Solar Bot Daily Report

on:
  schedule:
    # รันตอน 06:05 น. เวลาไทย (23:05 UTC)
    - cron: '5 23 * * *'
    # รันตอน 13:05 น. เวลาไทย (06:05 UTC)
    - cron: '5 6 * * *'
    # รันตอน 17:05 น. เวลาไทย (10:05 UTC)
    - cron: '5 10 * * *'
  workflow_dispatch: # ปลุ่มนี้ทำให้เรากดรันเองตอนไหนก็ได้เพื่อทดสอบ

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ดึงไฟล์โค้ด
        uses: actions/checkout@v3
      - name: ติดตั้ง Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: ติดตั้งแพ็กเกจ (ใบสั่งของ)
        run: pip install -r requirements.txt
      - name: รันบอทและส่ง LINE!
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py
